<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rivarly</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <style>
      /* Single dark theme (Packet-inspired). */
      :root {
        --color-background-body: #0b0c0e;
        --color-background-card: #141519;
        --color-background-hover: #1c1d22;
        --color-text-primary: #ececee;
        --color-text-secondary: #9b9ca4;
        --color-border-default: #262830;
        --color-base-blue: #4c6ef5;
        --color-base-green: #22C55E;
        --color-base-red: #EF4444;
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Poppins', 'sans-serif'],
              display: ['Poppins', 'sans-serif'],
            },
            colors: {
              'base-blue': 'var(--color-base-blue)',
              'base-green': 'var(--color-base-green)',
              'base-red': 'var(--color-base-red)',
              'background-body': 'var(--color-background-body)',
              'background-card': 'var(--color-background-card)',
              'background-hover': 'var(--color-background-hover)',
              'text-primary': 'var(--color-text-primary)',
              'text-secondary': 'var(--color-text-secondary)',
              'border-default': 'var(--color-border-default)',
            },
          },
        },
      }
    </script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-[#0b0c0e] text-[#ececee]">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
